syntax = "proto3";

package notification;

option java_multiple_files = true;
option java_package = "com.example.grpc.notification";
option java_outer_classname = "NotificationProto";

import "google/protobuf/timestamp.proto";
import "common/common.proto";

// Enums
enum NotificationChannel {
  NOTIFICATION_CHANNEL_UNSPECIFIED = 0;
  EMAIL = 1;
  SMS = 2;
  PUSH = 3;
  WHATSAPP = 4;
}

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
  URGENT = 4;
}

enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  QUEUED = 1;
  SENT = 2;
  DELIVERED = 3;
  FAILED = 4;
}

// Messages
message SendNotificationRequest {
  string recipient_id = 1;
  NotificationChannel channel = 2;
  NotificationPriority priority = 3;
  string template_id = 4;  // ID do template (payment_approved, payment_rejected)
  map<string, string> template_vars = 5;  // variáveis do template
  
  // campos específicos por canal
  optional string email_address = 6;
  optional string phone_number = 7;
  optional string device_token = 8;
}

message NotificationResponse {
  string notification_id = 1;
  NotificationStatus status = 2;
  google.protobuf.Timestamp sent_at = 3;
  common.ResponseMetadata metadata = 4;
}

message GetNotificationRequest {
  string notification_id = 1;
}

message BatchSendRequest {
  repeated SendNotificationRequest notifications = 1;
}

message BatchSendResponse {
  repeated NotificationResponse results = 1;
  int32 total_sent = 2;
  int32 total_failed = 3;
}

// Service definition
service NotificationService {
  // Unário: enviar notificação única
  rpc SendNotification(SendNotificationRequest) returns (NotificationResponse);
  
  // Unário: consultar status
  rpc GetNotification(GetNotificationRequest) returns (NotificationResponse);
  
  // Client streaming: envio em lote
  rpc BatchSend(stream SendNotificationRequest) returns (BatchSendResponse);
  
  // Bidirecional: monitoramento real-time (opcional, para exemplo)
  rpc MonitorNotifications(stream GetNotificationRequest) returns (stream NotificationResponse);
}
